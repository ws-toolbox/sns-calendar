<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS投稿カレンダー管理</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📱</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
</head>
<body class="bg-gradient-to-br from-purple-50 to-blue-50 min-h-screen">
    <div id="app" class="max-w-[1920px] mx-auto p-6"></div>

    <script>
        const CLIENT_ID = '417822818519-8imosvo7c9e2gem7cp0rse0vm8vrjlou.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/spreadsheets';
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
        const FOLDER_NAME = 'SNS投稿管理';
        const SHARED_DRIVE_ID = '0AHJk3pS7tSEgUk9PVA';
        const TARGET_FOLDER_ID = '1I23qmcfZ_x8c15NtW54vjhKQb7waJi-E';
        const SPREADSHEET_ID = '1QOwpEbvttoE51vjBNy79IEwPEUqAPBWMXYTB9on_NIw';
        const VIDEO_FOLDER_ID = '1085XOWlyw--O2ITRwS2kum2dXKZ8s87c';
        const LOCAL_STORAGE_PREFIX = 'sns_calendar_cache_v1_';
        const SAVE_DEBOUNCE_MS = 1500;
        const POLL_INTERVAL_MS = 600000; // 10分
        const APP_VERSION = '2026/05/25 (保存ガード追加)';

        let gapiInited = false;
        let gisInited = false;
        let tokenClient;
        let accessToken = null;
        let fileId = null;
        let saveTimerId = null;
        let pendingDirty = false;
        let initialSyncDone = false; // 初回ロードで Drive と同期完了したか。完了まで保存/編集を抑止し上書き事故を防ぐ
        let state = {
            currentDate: new Date(),
            posts: {},
            selectedDate: null,
            editingPostId: null,
            viewMode: 'edit',
            isSignedIn: false,
            isSaving: false,
            isDriveLoading: false,
            folderId: null,
            lastUpdated: null,
            lastSyncedModifiedTime: null,
            currentYear: new Date().getFullYear(),
            userName: null,
            formData: {title: '', platforms: [], text: '', images: [], checks: [], completedChecks: []}
        };

        // ========== localStorage キャッシュ (年単位) ==========
        function cacheKey(year) {
            return `${LOCAL_STORAGE_PREFIX}${year}`;
        }

        function saveCurrentYearCache() {
            try {
                const year = state.currentDate.getFullYear();
                localStorage.setItem(cacheKey(year), JSON.stringify({
                    posts: state.posts,
                    lastUpdated: state.lastUpdated
                }));
            } catch (e) {
                console.error('localStorage 保存失敗:', e);
            }
        }

        function loadYearCache(year) {
            try {
                const raw = localStorage.getItem(cacheKey(year));
                if (!raw) return false;
                const data = JSON.parse(raw);
                state.posts = data.posts || {};
                state.lastUpdated = data.lastUpdated || null;
                return true;
            } catch (e) {
                console.error('localStorage 読み込み失敗:', e);
                return false;
            }
        }

        // ========== 保存スケジューリング (debounce) ==========
        function persistState() {
            saveCurrentYearCache();
            scheduleSave();
        }

        function scheduleSave() {
            if (!state.isSignedIn) {
                pendingDirty = true;
                return;
            }
            pendingDirty = true;
            if (saveTimerId) clearTimeout(saveTimerId);
            saveTimerId = setTimeout(() => {
                saveTimerId = null;
                if (state.isSaving) {
                    scheduleSave();
                    return;
                }
                saveToDrive();
            }, SAVE_DEBOUNCE_MS);
        }

        // 離脱前に未同期の変更を flush (best effort)
        window.addEventListener('beforeunload', () => {
            if (pendingDirty && state.isSignedIn) {
                try {
                    if (saveTimerId) clearTimeout(saveTimerId);
                    saveToDrive();
                } catch (_) {}
            }
        });

        // URLパラメータを取得
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                date: params.get('date'),
                post: params.get('post') ? parseInt(params.get('post')) : null
            };
        }

        // URLパラメータを設定
        function setUrlParams(date, postId) {
            const url = new URL(window.location);
            if (date && postId) {
                url.searchParams.set('date', date);
                url.searchParams.set('post', postId);
            } else {
                url.searchParams.delete('date');
                url.searchParams.delete('post');
            }
            window.history.pushState({}, '', url);
        }
        
        async function findAndDownloadVideo(productNumber) {
            if (!state.isSignedIn || !productNumber) {
                showMessage('商品番号が入力されていません', 'error');
                return;
            }
        
            try {
                showMessage('動画を検索中...', 'success');
        
                // 動画ファイルを検索
                const response = await gapi.client.drive.files.list({
                    q: `name='${productNumber}.mp4' and '${VIDEO_FOLDER_ID}' in parents and trashed=false`,
                    fields: 'files(id, name, webContentLink)',
                    spaces: 'drive',
                    supportsAllDrives: true,
                    includeItemsFromAllDrives: true
                });
        
                if (response.result.files && response.result.files.length > 0) {
                    const fileId = response.result.files[0].id;
                    const downloadUrl = `https://drive.google.com/uc?export=download&id=${fileId}`;
                    
                    // ダウンロードを開始
                    window.open(downloadUrl, '_blank');
                    showMessage('動画のダウンロードを開始しました', 'success');
                } else {
                    showMessage(`動画ファイル「${productNumber}.mp4」が見つかりませんでした`, 'error');
                }
            } catch (error) {
                console.error('Instagram投稿エラー:', error);
                console.error('エラー詳細:', JSON.stringify(error, null, 2));
                if (error.result) {
                    console.error('API レスポンス:', error.result);
                }
                showMessage(`❌ Instagram投稿に失敗しました: ${error.message || error.toString() || 'Unknown error'}`, 'error');
            }
        }

        async function changeMonth(offset) {
            const oldYear = state.currentDate.getFullYear();
            // 現在の年のキャッシュを保存してから移動
            if (pendingDirty) saveCurrentYearCache();
            state.currentDate.setMonth(state.currentDate.getMonth() + offset);
            const newYear = state.currentDate.getFullYear();

            if (oldYear !== newYear && state.currentYear !== newYear) {
                state.currentYear = newYear;
                // まずキャッシュから即描画
                if (loadYearCache(newYear)) {
                    render();
                }
                // Drive 取得はバックグラウンド
                if (state.isSignedIn) {
                    loadYearData({ silent: true });
                }
            }

            render();
        }
        
        function copyProductUrl(productNumber) {
            const url = `https://winds-score.com/products/${productNumber}`;
            copyToClipboard(url);
        }

        function getCurrentYearFileName() {
            const currentYear = new Date().getFullYear();
            return `sns_calendar_data_${currentYear}.json`;
        }

        function gapiLoaded() {
            gapi.load('client', initializeGapiClient);
        }

        async function initializeGapiClient() {
            await gapi.client.init({
                discoveryDocs: [
                    DISCOVERY_DOC,
                    'https://sheets.googleapis.com/$discovery/rest?version=v4'
                ]
            });
            gapiInited = true;
            maybeEnableButtons();
        }

        async function uploadMediaToDrive(file) {
            if (!state.isSignedIn) return null;
        
            try {
                const metadata = {
                    name: file.name,
                    parents: [VIDEO_FOLDER_ID] // 動画用のフォルダIDを定義
                };
        
                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', file);
        
                const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true', {
                    method: 'POST',
                    headers: new Headers({ 'Authorization': 'Bearer ' + accessToken }),
                    body: form
                });
        
                if (!response.ok) {
                    throw new Error(`アップロードに失敗: ${response.status}`);
                }
        
                const result = await response.json();
                return result.id; // アップロードしたファイルのID
            } catch (error) {
                console.error('メディアアップロードエラー:', error);
                showMessage('メディアのアップロードに失敗', 'error');
                return null;
            }
        }

        async function exportToSpreadsheet() {
            if (!state.isSignedIn) {
                showMessage('先にGoogle Driveに接続してください', 'error');
                return;
            }
        
            if (Object.keys(state.posts).length === 0) {
                showMessage('エクスポートするデータがありません', 'error');
                return;
            }
        
            try {
                showMessage('スプレッドシートに書き込み中...', 'success');
        
                // データを準備
                const headers = [['投稿日', 'タイトル', '商品番号', '動画埋込', '投稿先', '投稿テキスト', 'リンク先', '備考', 'チェック完了者', '最終更新日時']];
                const rows = [];
                
                Object.keys(state.posts).sort().forEach(date => {
                    state.posts[date].forEach(post => {
                        const platforms = (post.platforms || [post.platform]).map(p => {
                            const badges = {
                                x: '𝕏',
                                instagram: 'Instagram',
                                line: 'LINE',
                                stumaga: 'スタマガ',
                                youtube: 'YouTube'
                            };
                            return badges[p] || p;
                        }).join(', ');
                        
                        const checks = (post.checks || []).join(', ');
                        const links = (post.links || []).join('\n');
                        
                        rows.push([
                            date,
                            post.title || '無題',
                            post.productNumber || '',
                            post.embedProduct ? 'はい' : '',
                            platforms,
                            post.text || '',
                            links,
                            post.remarks || '',
                            checks,
                            new Date().toLocaleString('ja-JP')
                        ]);
                    });
                });
        
                // シートをクリアしてデータを書き込み
                await gapi.client.sheets.spreadsheets.values.clear({
                    spreadsheetId: SPREADSHEET_ID,
                    range: 'シート1!A1:Z'
                });
        
                await gapi.client.sheets.spreadsheets.values.update({
                    spreadsheetId: SPREADSHEET_ID,
                    range: 'シート1!A1',
                    valueInputOption: 'RAW',
                    resource: {
                        values: [...headers, ...rows]
                    }
                });
        
                // ヘッダー行を太字にフォーマット
                await gapi.client.sheets.spreadsheets.batchUpdate({
                    spreadsheetId: SPREADSHEET_ID,
                    resource: {
                        requests: [{
                            repeatCell: {
                                range: {
                                    sheetId: 0,
                                    startRowIndex: 0,
                                    endRowIndex: 1
                                },
                                cell: {
                                    userEnteredFormat: {
                                        textFormat: {
                                            bold: true
                                        }
                                    }
                                },
                                fields: 'userEnteredFormat.textFormat.bold'
                            }
                        }]
                    }
                });
        
                // スプレッドシートを開く
                window.open(`https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}`, '_blank');
                showMessage('スプレッドシートに書き込みました！', 'success');
        
            } catch (error) {
                console.error('スプレッドシート書き込みエラー:', error);
                showMessage('スプレッドシートへの書き込みに失敗しました: ' + (error.result?.error?.message || error.message), 'error');
            }
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: ''
            });
            gisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (gapiInited && gisInited) {
                tryAutoSignIn();
            }
        }
        
        function addVideoPath() {
            if (!state.formData.videoPaths) {
                state.formData.videoPaths = [];
            }
            
            if (state.formData.videoPaths.length < 3) {
                state.formData.videoPaths.push({
                    name: `動画 ${state.formData.videoPaths.length + 1}`,
                    path: '',
                    uploadDate: new Date().toISOString()
                });
                render();
            } else {
                showMessage('動画パスは最大3つまで追加できます', 'error');
            }
        }

        function handleAuthClick() {
            tokenClient.callback = async (resp) => {
                if (resp.error !== undefined) {
                    throw (resp);
                }
                accessToken = gapi.client.getToken().access_token;
                state.isSignedIn = true;
                localStorage.setItem('google_access_token', JSON.stringify(gapi.client.getToken()));
                render();
                // ユーザー情報・Drive 読み込みはバックグラウンド
                getUserInfo().catch(() => {}).finally(() => render());
                loadFromDrive();
            };
            tokenClient.requestAccessToken({prompt: ''});
        }

        async function tryAutoSignIn() {
            const savedToken = localStorage.getItem('google_access_token');
            if (!savedToken) {
                render();
                return;
            }
            try {
                const token = JSON.parse(savedToken);
                gapi.client.setToken(token);
                accessToken = token.access_token;
                state.isSignedIn = true;
                render();
                // ユーザー情報・Drive 読み込みはバックグラウンド
                getUserInfo().catch(() => {}).finally(() => render());
                loadFromDrive();
            } catch (error) {
                localStorage.removeItem('google_access_token');
                accessToken = null;
                state.isSignedIn = false;
                state.userName = null;
                render();
            }
        }

        async function getUserInfo() {
            if (!accessToken) {
                state.userName = null;
                return;
            }
            
            try {
                const response = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
                    headers: {
                        'Authorization': 'Bearer ' + accessToken
                    }
                });
                
                if (!response.ok) {
                    state.userName = null;
                    return;
                }
                
                const userInfo = await response.json();
                state.userName = userInfo.name || userInfo.email;
            } catch (error) {
                state.userName = null;
            }
        }

        function handleSignOut() {
            gapi.client.setToken(null);
            localStorage.removeItem('google_access_token');
            accessToken = null;
            state.isSignedIn = false;
            state.userName = null;
            state.posts = {};
            state.folderId = null;
            fileId = null;
            initialSyncDone = false;
            render();
            showMessage('ログアウトしました', 'success');
        }

        async function refreshTokenIfNeeded() {
            if (!state.isSignedIn) return;
            // 注: トークンの事前検証 API コールは削除しました（保存/取得時に 401 で検知）。
            // 期限切れの場合のみ再認証フローを呼び出すように変更。
            // この関数は互換性のため残しています（明示的に再認証したい場合に使用）。
            try {
                await gapi.client.drive.files.list({
                    pageSize: 1,
                    supportsAllDrives: true
                });
            } catch (error) {
                console.log('Token expired, refreshing...');
                
                // トークンが期限切れの場合、再認証を試みる
                tokenClient.callback = async (resp) => {
                    if (resp.error !== undefined) {
                        console.error('Token refresh failed:', resp);
                        showMessage('認証が切れました。再ログインしてください。', 'error');
                        handleSignOut();
                        return;
                    }
                    accessToken = gapi.client.getToken().access_token;
                    state.isSignedIn = true;
                    localStorage.setItem('google_access_token', JSON.stringify(gapi.client.getToken()));
                    await getUserInfo();
                    showMessage('認証を更新しました', 'success');
                    render();
                };
                
                // プロンプトなしで再認証を試みる
                tokenClient.requestAccessToken({prompt: ''});
            }
        }

        async function loadFromDrive(options = {}) {
            const { silent = true } = options;
            if (state.isDriveLoading) return;
            state.isDriveLoading = true;
            render();
            try {
                let folderId = null;
                const folderResponse = await gapi.client.drive.files.list({
                    q: `name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false and '${TARGET_FOLDER_ID}' in parents`,
                    fields: 'files(id, name)',
                    spaces: 'drive',
                    supportsAllDrives: true,
                    includeItemsFromAllDrives: true,
                    corpora: 'drive',
                    driveId: SHARED_DRIVE_ID
                });

                if (folderResponse.result.files && folderResponse.result.files.length > 0) {
                    folderId = folderResponse.result.files[0].id;
                    if (!silent) showMessage('指定フォルダ内のフォルダに接続しました', 'success');
                } else {
                    showMessage('「SNS投稿管理」フォルダが見つかりません。管理者に連絡してください。', 'error');
                    handleSignOut();
                    return;
                }

                state.folderId = folderId;
                state.currentYear = state.currentDate.getFullYear();
                await loadYearData({ silent });
            } catch (error) {
                console.error('共有ドライブ読み込みエラー:', error);
                if (error.status === 401 || error.result?.error?.code === 401) {
                    showMessage('認証の有効期限が切れました。再ログインしてください。', 'error');
                    handleSignOut();
                } else {
                    showMessage('エラー: ' + (error.result?.error?.message || error.message), 'error');
                }
            } finally {
                state.isDriveLoading = false;
                render();
            }
        }

        async function loadYearData(options = {}) {
            const { silent = false, force = false } = options;
            if (!state.folderId) return;

            const currentYear = state.currentDate.getFullYear();
            const fileName = `sns_calendar_data_${currentYear}.json`;

            try {
                const response = await gapi.client.drive.files.list({
                    q: `name='${fileName}' and '${state.folderId}' in parents and trashed=false`,
                    fields: 'files(id, name, modifiedTime)',
                    spaces: 'drive',
                    supportsAllDrives: true,
                    includeItemsFromAllDrives: true
                });

                const files = response.result.files;
                if (files && files.length > 0) {
                    fileId = files[0].id;
                    const serverModifiedTime = files[0].modifiedTime;

                    // ローカルキャッシュより Drive が新しい場合のみ取得
                    const localTime = state.lastUpdated ? new Date(state.lastUpdated).getTime() : 0;
                    const serverTime = new Date(serverModifiedTime).getTime();
                    const remoteIsNewer = serverTime - localTime > 1000;

                    if (force || !state.lastUpdated || remoteIsNewer) {
                        const fileContent = await gapi.client.drive.files.get({
                            fileId: fileId,
                            alt: 'media',
                            supportsAllDrives: true
                        });

                        if (fileContent.body) {
                            const data = JSON.parse(fileContent.body);
                            // ローカルに未同期変更がある場合は確認
                            if (pendingDirty && state.lastUpdated && !force) {
                                const ok = confirm(
                                    'ローカルに未同期の変更がありますが、リモートも更新されています。\n' +
                                    `ローカル: ${formatDateTime(state.lastUpdated)}\n` +
                                    `リモート: ${formatDateTime(serverModifiedTime)}\n\n` +
                                    'OK = ローカル変更を保持してリモートに反映\n' +
                                    'キャンセル = リモートを取得（ローカル変更は破棄）'
                                );
                                if (ok) {
                                    state.lastSyncedModifiedTime = serverModifiedTime;
                                    initialSyncDone = true;
                                    scheduleSave();
                                    return;
                                }
                            }
                            state.posts = data.posts || {};
                            state.lastUpdated = serverModifiedTime;
                            state.lastSyncedModifiedTime = serverModifiedTime;
                            initialSyncDone = true;
                            saveCurrentYearCache();
                            if (!silent) showMessage(`${currentYear}年のデータを読み込みました`, 'success');

                            const urlParams = getUrlParams();
                            if (urlParams.date && urlParams.post) {
                                openEditForm(new Date(urlParams.date).getDate(), urlParams.post);
                            }
                        }
                    } else {
                        // ローカルが最新 → そのまま使用、lastSyncedModifiedTime のみ更新
                        state.lastSyncedModifiedTime = serverModifiedTime;
                        if (pendingDirty) scheduleSave();
                    }
                } else {
                    // Drive にファイル無し
                    fileId = null;
                    state.lastSyncedModifiedTime = null;
                    if (!state.lastUpdated) {
                        state.posts = {};
                        if (!silent) showMessage(`${currentYear}年の新規データを作成します`, 'success');
                    } else if (pendingDirty) {
                        // ローカル変更を Drive に保存
                        scheduleSave();
                    }
                }
                // サーバー状態との照合が完了 → 保存/編集を解禁
                initialSyncDone = true;
            } catch (error) {
                console.error('年データ読み込みエラー:', error);
                if (error.status === 401 || error.result?.error?.code === 401) {
                    showMessage('認証の有効期限が切れました。再ログインしてください。', 'error');
                    handleSignOut();
                }
            }
        }

        async function checkForUpdates() {
            if (!state.isSignedIn || !state.folderId) return;

            try {
                const currentYear = state.currentDate.getFullYear();
                const fileName = `sns_calendar_data_${currentYear}.json`;

                const response = await gapi.client.drive.files.list({
                    q: `name='${fileName}' and '${state.folderId}' in parents and trashed=false`,
                    fields: 'files(id, modifiedTime)',
                    spaces: 'drive',
                    supportsAllDrives: true,
                    includeItemsFromAllDrives: true
                });

                if (response.result.files && response.result.files.length > 0) {
                    const serverModifiedTime = new Date(response.result.files[0].modifiedTime).getTime();
                    const syncedTime = state.lastSyncedModifiedTime
                        ? new Date(state.lastSyncedModifiedTime).getTime()
                        : (state.lastUpdated ? new Date(state.lastUpdated).getTime() : 0);

                    if (serverModifiedTime - syncedTime > 1000) {
                        if (confirm('他のユーザーがデータを更新しました。最新データを読み込みますか？\n\n※編集中の場合、編集内容は保持されます。')) {
                            const currentFormData = state.selectedDate ? {...state.formData} : null;
                            const currentEditingPostId = state.editingPostId;
                            const currentViewMode = state.viewMode;
                            const currentSelectedDate = state.selectedDate;

                            await loadYearData({ silent: false, force: true });

                            if (currentSelectedDate) {
                                state.selectedDate = currentSelectedDate;
                                state.editingPostId = currentEditingPostId;
                                state.viewMode = currentViewMode;
                                if (currentFormData) {
                                    state.formData = currentFormData;
                                }
                            }

                            render();
                        }
                    }
                }
            } catch (error) {
                console.error('更新チェックエラー:', error);
            }
        }
        
        async function saveToDrive() {
            if (!state.isSignedIn || !state.folderId || state.isSaving) return;
            if (!pendingDirty) return;
            // 初回ロード完了前は保存しない（読込前の部分状態でサーバーを上書きしないため）
            if (!initialSyncDone) {
                pendingDirty = true;
                scheduleSave(); // 同期完了後に再試行
                return;
            }

            state.isSaving = true;
            render();

            try {
                // 競合チェック: Drive 側の modifiedTime が自分の lastSyncedModifiedTime より新しいか
                if (fileId) {
                    try {
                        const checkResponse = await gapi.client.drive.files.get({
                            fileId: fileId,
                            fields: 'modifiedTime',
                            supportsAllDrives: true
                        });
                        const serverModifiedTime = new Date(checkResponse.result.modifiedTime).getTime();
                        const syncedTime = state.lastSyncedModifiedTime ? new Date(state.lastSyncedModifiedTime).getTime() : 0;
                        if (serverModifiedTime - syncedTime > 1000) {
                            const ok = confirm(
                                '他のユーザーが先に更新しています。\n' +
                                `リモート更新: ${formatDateTime(checkResponse.result.modifiedTime)}\n` +
                                `ローカル更新: ${formatDateTime(state.lastUpdated)}\n\n` +
                                'OK = ローカルを優先して上書き保存\n' +
                                'キャンセル = リモートを取得（ローカル変更は破棄）'
                            );
                            if (!ok) {
                                pendingDirty = false;
                                state.isSaving = false;
                                await loadYearData({ silent: false, force: true });
                                return;
                            }
                        }
                    } catch (e) {
                        console.warn('競合チェック失敗（保存は継続）:', e);
                    }
                }

                const currentYear = state.currentDate.getFullYear();
                const fileName = `sns_calendar_data_${currentYear}.json`;
                const now = new Date().toISOString();
                const content = JSON.stringify({
                    posts: state.posts,
                    lastUpdated: now
                });

                const file = new Blob([content], { type: 'application/json' });
                const metadata = fileId ? {
                    name: fileName,
                    mimeType: 'application/json'
                } : {
                    name: fileName,
                    mimeType: 'application/json',
                    parents: [state.folderId]
                };

                const form = new FormData();
                form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
                form.append('file', file);

                const url = fileId
                    ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart&supportsAllDrives=true&fields=id,modifiedTime`
                    : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&supportsAllDrives=true&fields=id,modifiedTime`;

                const response = await fetch(url, {
                    method: fileId ? 'PATCH' : 'POST',
                    headers: new Headers({ 'Authorization': 'Bearer ' + accessToken }),
                    body: form
                });

                if (response.status === 401) {
                    showMessage('認証の有効期限が切れました。再ログインしてください。', 'error');
                    handleSignOut();
                    return;
                }
                if (!response.ok) {
                    throw new Error(`保存に失敗: ${response.status}`);
                }

                // 保存レスポンスから modifiedTime を直接取得（追加 API コール不要）
                const result = await response.json();
                if (!fileId) fileId = result.id;
                const serverModifiedTime = result.modifiedTime || now;
                state.lastUpdated = serverModifiedTime;
                state.lastSyncedModifiedTime = serverModifiedTime;
                pendingDirty = false;
                saveCurrentYearCache();

            } catch (error) {
                console.error('保存エラー:', error);
                showMessage('保存に失敗: ' + error.message, 'error');
            } finally {
                state.isSaving = false;
                render();
            }
        }

        function formatDateTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, '0')}/${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        function formatDate(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function getDaysInMonth(date) {
            const year = date.getFullYear();
            const month = date.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            return {
                daysInMonth: lastDay.getDate(),
                startingDayOfWeek: firstDay.getDay()
            };
        }

        async function savePost() {
            if (!state.formData.title && !state.formData.text) return;
         
            // 画像と動画を分離
            const imageFiles = state.formData.images.filter(file => file.type === 'image');
            const videoFiles = state.formData.images.filter(file => file.type === 'video');
         
            const newPost = {
                ...state.formData,
                id: state.editingPostId || Date.now(),
                images: imageFiles.map(file => ({
                    type: file.type,
                    name: file.name,
                    size: file.data ? file.data.length : 0,
                    data: file.data,
                    uploadDate: new Date().toISOString()
                })),
                checks: state.formData.checks || [],
                completedChecks: state.formData.completedChecks || [],
                productNumber: state.formData.productNumber || '',
                embedProduct: state.formData.embedProduct || false,
                remarks: state.formData.remarks || '',
                links: state.formData.links || [],
            };
         
            const datePosts = state.posts[state.selectedDate] || [];
            if (state.editingPostId) {
                // 全ての日付から該当する投稿を検索
                let oldDateStr = null;
                for (const dateStr in state.posts) {
                    const foundPost = state.posts[dateStr].find(p => p.id === state.editingPostId);
                    if (foundPost) {
                        oldDateStr = dateStr;
                        break;
                    }
                }
                
                // 元の日付と異なる場合は移動
                if (oldDateStr && oldDateStr !== state.selectedDate) {
                    // 元の日付から削除
                    const oldDatePosts = state.posts[oldDateStr].filter(p => p.id !== state.editingPostId);
                    if (oldDatePosts.length === 0) {
                        delete state.posts[oldDateStr];
                    } else {
                        state.posts[oldDateStr] = oldDatePosts;
                    }
                    
                    // 新しい日付に追加
                    state.posts[state.selectedDate] = [...datePosts, newPost];
                    showMessage('投稿日を変更して保存しました', 'success');
                } else {
                    // 同じ日付内で更新
                    const existingPostIndex = datePosts.findIndex(p => p.id === state.editingPostId);
                    
                    if (existingPostIndex !== -1) {
                        state.posts[state.selectedDate] = datePosts.map(p => p.id === state.editingPostId ? newPost : p);
                    } else {
                        state.posts[state.selectedDate] = [...datePosts, newPost];
                        showMessage('投稿が削除されていたため、新規投稿として保存しました', 'success');
                    }
                }
            } else {
                state.posts[state.selectedDate] = [...datePosts, newPost];
                // 新規投稿の場合、作成した投稿のIDを設定
                state.editingPostId = newPost.id;
            }

            persistState();

            // 閲覧モードに切り替え
            state.viewMode = 'view';
            render();
        }

        function getFileExtension(file) {
            if (file.type === 'image') {
                const match = file.data.match(/^data:image\/([a-zA-Z0-9]+);/);
                return match ? `.${match[1]}` : '.png';
            }
            if (file.type === 'video') {
                const match = file.data.match(/^data:video\/([a-zA-Z0-9]+);/);
                return match ? `.${match[1]}` : '.mp4';
            }
            return '';
        }

                };

                    },

                });

                    }]
                };
                
                // GASにGETパラメータで送信
                const gasUrl = 'https://script.google.com/macros/s/AKfycbxqiiz2CiEslO4GVeAzb_-jWaprmONG6PBtogkX6DM6gvjyZTv0lkhh7GegQDfE3af4jA/exec';
                const params = new URLSearchParams({
                    data: JSON.stringify(payload)
                });
                
                // iframeで送信（CORS回避）
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = `${gasUrl}?${params.toString()}`;
                document.body.appendChild(iframe);
                
                // 2秒後にiframeを削除
                setTimeout(() => {
                    document.body.removeChild(iframe);
                }, 2000);
                
                showMessage('✅ Slackに確認依頼を送信しました', 'success');
                
            } catch (error) {
                console.error('Slack通知エラー:', error);
                showMessage('❌ Slack通知の送信に失敗しました: ' + error.message, 'error');
            }
        }

        async function loadSlackWebhook() {
            try {
                const response = await gapi.client.drive.files.list({
                    q: `name='slack_webhook.txt' and '${state.folderId}' in parents and trashed=false`,
                    fields: 'files(id, name)',
                    spaces: 'drive',
                    supportsAllDrives: true,
                    includeItemsFromAllDrives: true
                });

                if (response.result.files && response.result.files.length > 0) {
                    const fileId = response.result.files[0].id;
                    const content = await gapi.client.drive.files.get({
                        fileId: fileId,
                        alt: 'media',
                        supportsAllDrives: true
                    });
                    
                    return content.body.trim();
                } else {
                    console.warn('slack_webhook.txt が見つかりません');
                    return null;
                }
            } catch (error) {
                console.error('Webhook URL読み込みエラー:', error);
                return null;
            }
        }

                                    rows="4"
                                    style="min-height: 100px; resize: vertical; overflow: hidden;"
                                >${state.formData.text}</textarea>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-700 mb-1">リンク先（最大5つ）</label>
                                ${state.formData.links && state.formData.links.length > 0 ? state.formData.links.map((link, index) => `
                                    <div class="flex gap-2 mb-2">
                                        <input 
                                            type="url" 
                                            value="${link}" 
                                            onchange="state.formData.links[${index}] = this.value" 
                                            placeholder="https://example.com" 
                                            class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                                        >
                                        ${state.formData.links.length > 1 ? `
                                            <button onclick="removeLink(${index})" class="bg-red-500 hover:bg-red-600 text-white px-3 py-2 rounded-lg transition-colors text-xs">
                                                ×
                                            </button>
                                        ` : ''}
                                        ${index === state.formData.links.length - 1 && state.formData.links.length < 5 ? `
                                            <button onclick="addLink()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded-lg transition-colors text-xs whitespace-nowrap">
                                                + リンクを追加
                                            </button>
                                        ` : ''}
                                    </div>
                                `).join('') : `
                                    <div class="flex gap-2 mb-2">
                                        <input 
                                            type="url" 
                                            value="" 
                                            onchange="if(!state.formData.links) state.formData.links = []; state.formData.links[0] = this.value" 
                                            placeholder="https://example.com" 
                                            class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                                        >
                                        <button onclick="addLink()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded-lg transition-colors text-xs whitespace-nowrap">
                                            + リンクを追加
                                        </button>
                                    </div>
                                `}
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-700 mb-1">備考</label>
                                <textarea onchange="state.formData.remarks = this.value" placeholder="メモや備考を入力..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" rows="2">${state.formData.remarks || ''}</textarea>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-700 mb-1">画像（最大20枚）<span class="ml-2 text-xs text-gray-500">${state.formData.images.length} / 20</span></label>
                                <div class="border-2 border-dashed rounded-lg p-3 text-center border-gray-300 hover:border-blue-400">
                                    ${state.formData.images.length > 0 ? `
                                        <div>
                                            <div class="grid grid-cols-3 gap-2 mb-2">
                                                ${state.formData.images.map((image, index) => `
                                                    <div class="relative group">
                                                        ${image.type === 'image' ? `
                                                            <img src="${image.data}" alt="画像 ${index + 1}" class="w-full h-20 object-cover rounded-lg">
                                                        ` : `
                                                            <video src="${image.data}" class="w-full h-20 object-cover rounded-lg" controls></video>
                                                        `}
                                                        <button onclick="removeImage(${index})" class="absolute top-1 right-1 bg-red-500 text-white p-1 rounded-full hover:bg-red-600 transition-colors shadow-lg opacity-0 group-hover:opacity-100 text-xs leading-none w-5 h-5 flex items-center justify-center">
                                                            ×
                                                        </button>
                                                    </div>
                                                `).join('')}
                                            </div>
                                            ${state.formData.images.length < 20 ? `
                                                <label class="inline-block bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded-lg cursor-pointer transition-colors text-xs">
                                                    + さらに追加
                                                    <input type="file" accept="image/*,video/*" multiple onchange="handleImageSelect(event)" class="hidden">
                                                </label>
                                            ` : ''}
                                        </div>
                                    ` : `
                                        <div>
                                            <label class="inline-block bg-blue-500 hover:bg-blue-600 text-white px-3 py-1.5 rounded-lg cursor-pointer transition-colors text-xs">
                                                📸 画像を選択
                                                <input type="file" accept="image/*,video/*" multiple onchange="handleImageSelect(event)" class="hidden">
                                            </label>
                                        </div>
                                    `}
                                </div>
                            </div>
                            <div class="flex gap-2 pt-2">
                                <button onclick="savePost()" ${state.isSaving ? 'disabled' : ''} class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-lg font-semibold transition-colors text-sm ${state.isSaving ? 'opacity-50 cursor-not-allowed' : ''}">
                                    ${state.isSaving ? '⏳ 保存中...' : (state.editingPostId ? '更新' : '保存')}
                                </button>
                            </div>
                        </div>
                    </div>`;
                }
            }

            document.getElementById('app').innerHTML = `
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <a href="https://ws-toolbox.github.io/sns-calendar/" class="text-3xl font-bold text-gray-800 hover:text-blue-600 transition-colors no-underline">📱 SNS投稿カレンダー</a>
                        <button onclick="exportToSpreadsheet()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded-lg transition-colors text-xs flex items-center gap-1">
                            📊 スプレッドシート同期
                        </button>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        ${state.isSignedIn ? `
                            <div class="flex items-center gap-2">
                                ${state.userName ? `<div class="text-xs text-gray-600">ログイン中: ${state.userName}</div>` : ''}
                                <button onclick="loadFromDrive({silent: false})" ${state.isDriveLoading ? 'disabled' : ''} class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-2 py-1 rounded-lg text-xs transition-colors disabled:opacity-50" title="再取得">
                                    ${state.isDriveLoading ? '⏳' : '🔄'}
                                </button>
                                <div class="inline-flex items-center gap-2 ${!initialSyncDone ? 'bg-yellow-100 text-yellow-700' : (state.isSaving ? 'bg-yellow-100 text-yellow-700' : (pendingDirty ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700'))} px-3 py-1 rounded-lg text-xs">
                                    ${!initialSyncDone ? '📥 読み込み中...' : (state.isSaving ? '💾 保存中...' : (pendingDirty ? '✏️ 未同期' : '✅ 同期済'))}
                                </div>
                                <button onclick="handleSignOut()" class="bg-gray-500 hover:bg-gray-600 text-white px-3 py-1 rounded-lg text-xs transition-colors">
                                    ログアウト
                                </button>
                            </div>
                        ` : `
                            <div class="flex items-center gap-2">
                                ${state.lastUpdated ? `<div class="bg-gray-100 text-gray-600 px-3 py-1 rounded-lg text-xs">📂 ローカル表示中</div>` : ''}
                                <button onclick="handleAuthClick()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg font-semibold transition-colors shadow-lg text-sm">
                                    🔗 Google Driveに接続
                                </button>
                            </div>
                        `}
                        <div class="text-xs text-gray-400">
                            ${state.lastUpdated ? `最終更新: ${formatDateTime(state.lastUpdated)}　` : ''}アプリ更新: ${APP_VERSION}
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">
                    <div class="xl:col-span-2">
                        <div class="bg-white rounded-2xl shadow-xl p-6">
                            <div class="flex items-center justify-between mb-6">
                                <button onclick="changeMonth(-1)" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                                    ◀
                                </button>
                                <div class="flex items-center gap-3">
                                    <h2 class="text-2xl font-bold text-gray-800">${monthName}</h2>
                                    <button onclick="goToToday()" class="px-3 py-1 text-sm bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-colors">
                                        本日
                                    </button>
                                </div>
                                <button onclick="changeMonth(1)" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
                                    ▶
                                </button>
                            </div>
                            <div class="grid grid-cols-7 gap-2">
                                ${calendarHTML}
                            </div>
                        </div>
                    </div>
                    <div class="lg:col-span-1">
                        ${editFormHTML || (state.isSignedIn && !initialSyncDone
                            ? '<div class="bg-yellow-50 border border-yellow-200 rounded-2xl shadow-xl p-6 text-center text-yellow-700">📥 データを読み込み中です…<div class="text-xs mt-1">完了するまで編集・保存はできません</div></div>'
                            : '<div class="bg-gray-50 rounded-2xl shadow-xl p-6 text-center text-gray-500">カレンダーから日付を選択してください</div>')}
                    </div>
                </div>
            `;
            
            // テキストエリアの高さを自動調整
            const textarea = document.getElementById('postTextArea');
            if (textarea) {
                autoResizeTextarea(textarea);
            }
        }

        window.addEventListener('load', () => {
            // 1. localStorage キャッシュから即描画
            const currentYear = state.currentDate.getFullYear();
            loadYearCache(currentYear);
            render();
            // 2. Google API を裏で初期化
            gapiLoaded();
            gisLoaded();

            // 10分ごとに更新をチェック (タブが可視 + 編集中でない + 未保存なし)
            setInterval(() => {
                if (state.isSignedIn
                    && !state.isSaving
                    && !pendingDirty
                    && !state.selectedDate
                    && document.visibilityState === 'visible') {
                    checkForUpdates();
                }
            }, POLL_INTERVAL_MS);

            // タブが visible になったタイミングでも一度チェック
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible'
                    && state.isSignedIn
                    && !state.isSaving
                    && !pendingDirty
                    && !state.selectedDate) {
                    checkForUpdates();
                }
            });
        });
    </script>
</body>
</html>
